<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Title -->
    <title>Management System</title>



    <!-- Style CSS -->
    <link rel="stylesheet" href="style/style.css">

    <!-- Sass CSS -->
    <link rel="stylesheet" href="style/sass.css">

    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body class="bg-[#222]">

    <!-- Section Crud Start -->
    <section id="crud" class="my-16 w-[80%] min-h-screen mx-auto text-white">

        <div id="title" class="text-center text-white font-bold mb-10">
            <h1 class="text-4xl mb-2">Cruds</h1>
            <p class="text-2xl">Create Read Update Delete Search</p>
        </div>

        <input type="text" id="title" placeholder="Title" class="w-100%">
        <div class="price">
            <input type="number" id="price" placeholder="price">
            <input type="number" id="taxes" placeholder="Taxes">
            <input type="number" id="ads" placeholder="ADS">
            <input type="number" id="discount" placeholder="discount">
            <samall id="total"
                class="bg-red-400 w-25 ms-2 rounded-[10px] py-[13px] text-center font-bold text-[18px] inline-block hover:bg-red-600 duration-200 cursor-pointer">
                2500</samall>
        </div>

        <input type="number" id="count" placeholder="Count">
        <input type="text" id="categroy" placeholder="Categroy">
        <button id="create"
            class="w-[100%] py-3 rounded-[10px] text-2xl font-bold my-2 cursor-pointer bg-[#4f036c] hover:bg-[#620487] duration-300">Create</button>
        <input type="text" placeholder="Search" id="search">
        <div class="flex justify-between items-center">
            <button id="searchTitle"
                class="bg-[#4f036c] font-bold text-[21px] py-3 px-3 rounded-2xl mb-10 mt-2 w-[40%] cursor-pointer hover:bg-[#6f0e96] duration-300">Search
                By Title</button>
            <button id="searchCategory"
                class="bg-[#4f036c] font-bold text-[21px] py-3 px-3 rounded-2xl mb-10 mt-2 w-[40%] cursor-pointer hover:bg-[#6f0e96] duration-300">Search
                By Categroy</button>
        </div>

        <table class="w-full text-center mt-5 text-white overflow-hidden">
            <thead>
                <tr class="text-[21px]">
                    <th>ID</th>
                    <th>Title</th>
                    <th>Price</th>
                    <th>Taxes</th>
                    <th>Ads</th>
                    <th>Discount</th>
                    <th>Total</th> 
                    <th>Category</th>
                    <th>Update</th>
                    <th>Delete</th>
                </tr>
            </thead>
            <tbody>
                
                <tr>
                    <td>1</td>
                    <td>Oppo</td>
                    <td>7500</td>
                    <td>150</td>
                    <td>50</td>
                    <td>30</td>
                    <td>2500</td>
                    <td>Phone</td>
                    <td><button class="bg-[#310044] font-bold text-[17px] px-5 py-3 rounded cursor-pointer hover:bg-[#5a037d] duration-300">Update</button></td>
                    <td><button class="bg-red-600 font-bold text-[17px] px-5 py-3 rounded cursor-pointer hover:bg-red-800 duration-300">Delete</button></td>
                </tr>

            </tbody>
        </table>
    </section>
    <!-- Section Crud End -->




    <!-- LIbrary JQuery -->
    <script src="JQuery/jquery-4.0.0.min.js"></script>

    <!-- JQuery js -->
    <script src="JQuery/jquery.js"></script>

    <!-- Script JS -->
    <script src="JS/script.js"></script>

</body>

</html>
